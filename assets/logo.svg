<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 110" width="430" height="110" role="img" aria-label="Caddie AI">
  <title>Caddie AI</title>
  <!-- badge -->
  <rect x="6" y="15" width="80" height="80" rx="16" fill="#15803d"/>
  <!-- caddie flag (pixel mark), white on green so it reads on any page background -->
  <g shape-rendering="crispEdges">
    <rect x="34" y="31" width="4" height="44" fill="#ffffff" opacity="0.9"/>      <!-- pole -->
    <rect x="38" y="31" width="8" height="8" fill="#ffffff"/>                      <!-- flag -->
    <rect x="46" y="31" width="8" height="8" fill="#bbf7d0"/>
    <rect x="54" y="31" width="8" height="8" fill="#ffffff"/>
    <rect x="38" y="39" width="8" height="8" fill="#bbf7d0"/>
    <rect x="46" y="39" width="8" height="8" fill="#ffffff"/>
    <rect x="46" y="71" width="8" height="8" fill="#ffffff"/>                      <!-- ball -->
    <rect x="26" y="79" width="40" height="4" fill="#ffffff" opacity="0.55"/>     <!-- ground -->
  </g>
  <!-- wordmark (green reads on both light and dark README backgrounds) -->
  <text x="104" y="55" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#15803d">Caddie AI</text>
  <text x="106" y="80" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#64748b">Co-pilot for job movers</text>
</svg>
