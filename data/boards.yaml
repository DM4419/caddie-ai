  search_template: https://www.bayt.com/en/international/jobs/{q}-jobs/
  search_sep: '-'
  auth: none
  enabled: true
  custom: true
  note: Browser tier — renders the search with Playwright (rate-limited), fans out
    over your role queries. Won't defeat heavy bot walls (e.g. Glassdoor).
- name: Remote
  tier: browser
  region: ''
  url: https://remote.com/jobs/all?query=lead+product+manager&employmentType=full_time
  search_template: https://remote.com/jobs/all?query={q}&employmentType=full_time
  search_sep: +
  auth: none
  enabled: true
  custom: true
  note: Browser tier — renders the search with Playwright (rate-limited), fans out
    over your role queries. Won't defeat heavy bot walls (e.g. Glassdoor).
- name: Reed
  tier: listing
  region: ''
