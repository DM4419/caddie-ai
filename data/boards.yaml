# --- Aggregator APIs (key required; adapter pending). Disabled until a key is in
# --- .env and a fetcher module is wired in BOARD_FETCHERS. High-leverage breadth.
- name: TheirStack
  tier: api
  region: global
  url: https://app.theirstack.com/jobs
  endpoint: https://api.theirstack.com/v1/jobs/search
  auth: api_key
  enabled: true
  note: Live. Aggregates 347k+ sources incl. ATS, server-side dedup. Paid per job
    returned (~$0.0015-$0.039), so the query is funnelled by title + target-domain
    keyword + UK/Europe location + recency. Tune LOCATIONS / DOMAIN_SIGNALS in
    adapters/theirstack.py. Key in .env (THEIRSTACK_API_KEY).
- name: Google Jobs
  tier: api
  region: global
  url: https://www.google.com/search?q=product+manager&ibp=htl;jobs
  endpoint: https://serpapi.com/search?engine=google_jobs
  auth: api_key
  enabled: true
  note: Live via SerpAPI (engine=google_jobs). Query-based — one search per role
    title, UK-biased (gl=uk); paid per search (free tier ~100/mo), capped at 3 pages.
    Key in .env (SERPAPI_KEY).
