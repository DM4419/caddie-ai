# Job boards. tier: api | browser | ats | manual
# 'ats' boards carry {provider, slug} and are scanned by adapters/ats.py.
# Boards added via the UI are marked custom: true.

boards:
- name: RemoteOK
  tier: api
  region: remote
  url: https://remoteok.com/
  endpoint: https://remoteok.com/api
  auth: none
  enabled: true
  note: Public JSON feed (verified reachable, ~100 jobs/call).
- name: Working Nomads
  tier: api
  region: remote
  url: https://www.workingnomads.com/jobs
  endpoint: https://www.workingnomads.com/api/exposed_jobs/
  auth: none
  enabled: true
  note: Public JSON feed (verified reachable).
- name: Adzuna
  tier: api
  region: global
  url: https://www.adzuna.com/
  endpoint: https://api.adzuna.com/v1/api/jobs
  auth: api_key
  enabled: true
  note: Live (GB). Searches "product manager" by default; API returns description
    snippets only.
- name: Web3 Career
  tier: api
  region: remote
  url: https://web3.career/
  endpoint: https://web3.career/api/v1
  auth: token
  enabled: true
  note: Live. Token in .env; supports remote filter + real pagination.
- name: Cryptocurrency Jobs
  tier: browser
  region: remote
  url: https://cryptocurrencyjobs.co/product/
  endpoint: https://cryptocurrencyjobs.co/product/
  auth: none
  enabled: true
  note: HTML scrape of the /product/ category (no API). Card-level data; crypto/web3
    roles.
- name: Product Builder Jobs
  tier: browser
  region: remote
  url: https://productbuilderjobs.vercel.app/
  endpoint: https://productbuilderjobs.vercel.app/
  auth: none
  enabled: true
  note: React SPA backed by Supabase — needs the browser tier (or its Supabase endpoint)
    to index.
- name: Joblift
  tier: browser
  region: ''
  url: https://joblift.co.uk/Jobs-for-head%20of%20product
  search_template: https://joblift.co.uk/Jobs-for-{q}
  auth: none
  enabled: true
  custom: true
  note: Browser tier — renders the search with Playwright (rate-limited), fans out
    over your role queries. Won't defeat heavy bot walls (e.g. Glassdoor).
- name: Weworkremotely
  tier: browser
  region: ''
  url: https://weworkremotely.com/categories/remote-product-jobs
  search_template: ''
  search_sep: ''
  auth: none
  enabled: true
  custom: true
  note: Browser tier — renders the search with Playwright (rate-limited), scrapes
    this one URL. Won't defeat heavy bot walls (e.g. Glassdoor).
- name: Berlinstartupjobs
