# Job boards. tier: api | browser | ats | manual
# 'ats' boards carry {provider, slug} and are scanned by adapters/ats.py.
# Boards added via the UI are marked custom: true.

boards:
- name: RemoteOK
  tier: api
  region: remote
  url: https://remoteok.com/
  endpoint: https://remoteok.com/api
  auth: none
  enabled: true
  note: Public JSON feed (verified reachable, ~100 jobs/call).
- name: Working Nomads
  tier: api
  region: remote
  url: https://www.workingnomads.com/jobs
  endpoint: https://www.workingnomads.com/api/exposed_jobs/
  auth: none
  enabled: true
  note: Public JSON feed (verified reachable).
- name: Adzuna
  tier: api
  region: global
  url: https://www.adzuna.com/
  endpoint: https://api.adzuna.com/v1/api/jobs
  auth: api_key
  enabled: true
  note: Live (GB). Searches "product manager" by default; API returns description
    snippets only.
- name: Web3 Career
  tier: api
  region: remote
  url: https://web3.career/
  endpoint: https://web3.career/api/v1
  auth: token
  enabled: true
  note: Live. Token in .env; supports remote filter + real pagination.
- name: Remotive
  tier: api
  region: remote
  url: https://remotive.com/remote-jobs/product
  endpoint: https://remotive.com/api/remote-jobs
  auth: none
  enabled: true
  note: Public JSON API, no key. Keeps the Product-Management category client-side
    (server-side search is ignored). All remote; jobs delayed ~24h; credit Remotive.
- name: Himalayas
  tier: api
  region: remote
  url: https://himalayas.app/jobs
  endpoint: https://himalayas.app/jobs/api
  auth: none
  enabled: true
  note: Free JSON API, no key. 20 jobs/request, no server-side filter and not
    date-ordered, so we page a bounded budget + filter to product roles (limited
    yield per scan). All remote; attribution required.
- name: Arbeitnow
  tier: api
  region: global
  url: https://www.arbeitnow.com/
  endpoint: https://www.arbeitnow.com/api/job-board-api
  auth: none
  enabled: true
  note: Free Job Board API, no key. EU-weighted, sourced mostly from ATS platforms.
    Paginated feed; we keep product-titled roles client-side.
- name: Cryptocurrency Jobs
  tier: browser
  region: remote
  url: https://cryptocurrencyjobs.co/product/
  endpoint: https://cryptocurrencyjobs.co/product/
  auth: none
  enabled: true
  note: HTML scrape of the /product/ category (no API). Card-level data; crypto/web3
    roles.
- name: Product Builder Jobs
  tier: browser
  region: remote
  url: https://productbuilderjobs.vercel.app/
  endpoint: https://productbuilderjobs.vercel.app/
  auth: none
  enabled: true
  note: React SPA backed by Supabase — needs the browser tier (or its Supabase endpoint)
    to index.
- name: Joblift
  tier: browser
  region: ''
  url: https://joblift.co.uk/Jobs-for-head%20of%20product
  search_template: https://joblift.co.uk/Jobs-for-{q}
  auth: none
  enabled: true
  custom: true
  note: Browser tier — renders the search with Playwright (rate-limited), fans out
    over your role queries. Won't defeat heavy bot walls (e.g. Glassdoor).
- name: Weworkremotely
  tier: browser
  region: ''
  url: https://weworkremotely.com/categories/remote-product-jobs
  search_template: ''
  search_sep: ''
  auth: none
  enabled: true
  custom: true
  note: Browser tier — renders the search with Playwright (rate-limited), scrapes
    this one URL. Won't defeat heavy bot walls (e.g. Glassdoor).
- name: Berlinstartupjobs
  tier: browser
  region: ''
  url: https://berlinstartupjobs.com/product-management/
  search_template: ''
  search_sep: ''
  auth: none
  enabled: true
  custom: true
  note: Browser tier — renders the search with Playwright (rate-limited), scrapes
    this one URL. Won't defeat heavy bot walls (e.g. Glassdoor).
- name: Bayt
  tier: browser
  region: ''
  url: https://www.bayt.com/en/international/jobs/head-of-product-jobs/
  search_template: https://www.bayt.com/en/international/jobs/{q}-jobs/
  search_sep: '-'
  auth: none
  enabled: true
  custom: true
  note: Browser tier — renders the search with Playwright (rate-limited), fans out
    over your role queries. Won't defeat heavy bot walls (e.g. Glassdoor).
- name: Remote
  tier: browser
  region: ''
  url: https://remote.com/jobs/all?query=lead+product+manager&employmentType=full_time
  search_template: https://remote.com/jobs/all?query={q}&employmentType=full_time
  search_sep: +
  auth: none
  enabled: true
  custom: true
  note: Browser tier — renders the search with Playwright (rate-limited), fans out
    over your role queries. Won't defeat heavy bot walls (e.g. Glassdoor).
- name: Reed
  tier: listing
  region: ''
  url: https://www.reed.co.uk/jobs/head-of-product-jobs?fullTime=true
  search_template: https://www.reed.co.uk/jobs/{q}-jobs?fullTime=true
  search_sep: '-'
  auth: none
  enabled: true
  custom: true
  note: Listing board — fast static fetch, fans out over your role queries.
  pages: 8
- name: Workinstartups
