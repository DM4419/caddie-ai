# SAMPLE profile shipped with the repo so the app runs out of the box.
# Edit this in the UI (Settings tab) or here. `candidate_summary` + your base
# CV are what the AI scores roles against; `fit_rubric` is how it ranks them.
# `weights` must sum to 100 (used for the secondary weighted score + no-AI fallback).

# Weights must sum to 100. Location/remoteness is NOT scored — it's a hard gate
# (see `geo_gate` below), so the score reflects fit, not where the role sits.
weights:
  skills: 50
  domain: 30
  stage: 20
recency_days: 7

fit_rubric: |
  The candidate is a 0→1 product leader. Score each job 0-100 in TWO steps.
  Do NOT factor in location or remoteness — that's handled separately by the geo gate.

  STEP 1 — SKILLS & QUALIFICATIONS MATCH (the dominant driver of the score).
  Judge how specifically THIS role's stated requirements, responsibilities and
  must-haves line up with the candidate's skill set AND the concrete achievements
  in their CV. Reward specific, demonstrable overlap; penalise hard for
  requirements the candidate clearly lacks (deep technical depth, a domain they've
  never done, a scale they haven't operated at). A weak skills match CAPS the score
  LOW no matter how attractive the tier; a strong, specific match pushes it high.

  STEP 2 — COMPANY OPERATING-STYLE FIT. After the skills match sets the ceiling,
  place the role by how well the company's operating style suits the candidate;
  higher tiers earn the upper end of that ceiling.
    TIER 1 (ideal): early-stage, founder-led company building 0→1 products, where a
      hands-on builder owns a lot end-to-end.
    TIER 2 (great): a scaled but still product-led / fast-shipping company building
      B2B or AI products with real ownership.
    TIER 3: established company with a strong product culture and a clear 0→1 or
      turnaround mandate for the role.
    TIER 4 (lowest): slow, process-heavy or non-product-led environments.

  Onsite-only or a domain the candidate has no claim to should land low regardless
  of tier. Never let seniority or an exciting stage rescue a poorly-qualified role.

geo_gate:
- remote
- hybrid-uk
- hybrid-eu
- remote-eu
exclude_us_onsite_hybrid: true

languages:
  spoken:
  - english
  boost: []
  boost_points: 0
  block_score_cap: 20

candidate_summary: |
  I build products from zero to launch and lead the teams that scale them.
  10+ years taking products 0→1 across B2B SaaS, marketplaces and platforms,
  best in early-stage startups leading small cross-functional teams hands-on.
  Strengths: 0→1 launches, product discovery, prototyping, analytics, working in
  regulated environments, product ops. Remote-first, EU.

